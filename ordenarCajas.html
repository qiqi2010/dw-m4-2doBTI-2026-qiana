<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenar Boxes</title>
    
</head>
<body>

    <style>
        .contenedor{
            position: relative;
            border: 2px dashed #333;
            width: 500px;
            height: 200px;
        }
        .box-1{
            background-color: rgb(255, 0, 0);
            padding: 10px;
            width: 50px;
            top: 10px;
            left: 10px;
            position: absolute;
            text-align: center;

        }

        .box-2{
            background-color: rgb(255, 119, 0);
              padding: 10px;
            width: 50px;
            top: 10px;
            left: 440px;
            position: absolute;
            text-align: center;
        
        }

        .box-3{
            background-color: rgb(255, 217, 0);
              padding: 10px;
            width: 50px;
            top: 170px;
            left: 10px;
            position: absolute;
            text-align: center;
    
        }

        .box-4{
              background-color: rgb(30, 255, 0);
              padding: 10px;
            width: 50px;
            top: 170px;
            left: 440px;
            position: absolute;
            text-align: center;
        }

        .box-5{
             background-color: rgb(55, 0, 255);
              padding: 10px;
            width: 50px;
            top: 100px;
            left: 220px;
            position: absolute;
            text-align: center;
        }
    </style>

<div class="contenedor"></div>
<div class="box-1">1</div>
<div class="box-2">2</div>
<div class="box-3">3</div>
<div class="box-4">4</div>
<div class="box-5">5</div>
    
</body>
</html>
